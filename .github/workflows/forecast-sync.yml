name: Daily Forecast Pipeline

on:
  schedule:
    # 매일 오전 9시 30분 (KST) - 날씨 업데이트 후 실행
    - cron: '30 0 * * *'
  workflow_dispatch:  # 수동 실행

env:
  DEMAND_FORECAST_SHEET_ID: ${{ secrets.DEMAND_FORECAST_SHEET_ID }}

jobs:
  forecast-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy lightgbm scikit-learn scipy google-auth google-api-python-client google-cloud-bigquery db-dtypes

      - name: Setup credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.BIGQUERY_SERVICE_ACCOUNT }}' > credentials/service-account.json

      # 1. 일일 파이프라인 (예측 + 실적 비교 + Sheets 동기화)
      - name: Run daily pipeline
        run: python demand_forecast/daily_pipeline.py

      # 2. 실제 데이터 백필 (누락분)
      - name: Update actual data in Sheets
        run: python demand_forecast/sheets_sync.py update

      # 3. 결과 커밋
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demand_forecast/production_predictions.csv || true
          git add demand_forecast/production_performance_log.json || true
          git add demand_forecast/weather_2025_202601.csv || true
          git diff --staged --quiet || git commit -m "Daily forecast $(date +%Y-%m-%d)"
          git push || true
