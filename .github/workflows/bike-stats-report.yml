name: Monthly Bike Stats Report

on:
  schedule:
    # 매월 1일 오전 9시 (KST) = UTC 0시
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 수동 실행

jobs:
  bike-stats-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth pandas db-dtypes requests

      - name: Setup credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.BIGQUERY_SERVICE_ACCOUNT }}' > credentials/service-account.json

      - name: Run bike stats report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          BIKE_STATS_SLACK_CHANNEL: ${{ secrets.BIKE_STATS_SLACK_CHANNEL }}
        run: python bike_stats_report.py
