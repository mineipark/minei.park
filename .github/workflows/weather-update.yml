name: Update Weather Data

on:
  schedule:
    # 매일 오전 9시 (KST = UTC+9, UTC 기준 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Update weather data (ASOS)
        run: python demand_forecast/auto_update_weather.py

      - name: Backfill missing weather fields
        run: |
          python -c "
          import sys; sys.path.insert(0, 'demand_forecast')
          from fetch_weather_forecast import backfill_asos_weather
          backfill_asos_weather('demand_forecast/weather_2025_202601.csv')
          print('ASOS backfill completed')
          "

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet demand_forecast/weather_*.csv || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demand_forecast/weather_*.csv
          git commit -m "Auto update weather data $(date +%Y-%m-%d)"
          git push
